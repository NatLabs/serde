[package]
name = "serde-core"
version = "0.0.1"
description = "A serialisation and deserialisation library for Motoko. Mirrors NatLabs/serde (core branch) + NatLabs/ByteUtils (refs/pull/3/head) inlined."

keywords = ["json", "candid", "cbor", "urlencoded", "serialization"]
license = "MIT"
files = ["src/**/*.mo", "submodules/**/*.mo"]

[dependencies]
core = "2.0.0"
"itertools@0.2.2" = "0.2.2"
"xtended-numbers" = "2.3.0"
"xtended-numbers@2.3.0" = "2.3.0" # because for ByteUtils
"cbor@4.1.0" = "4.1.0"
"sha2@0.1.6" = "0.1.6"
base = "0.14.13" # because for submodules/json.mo

[dev-dependencies]
test = "2.1.1"
fuzz = "1.0.0"
rep-indy-hash = "0.1.1"
candid = "2.4.2"
bench = "1.0.0"

[toolchain]
wasmtime = "33.0.1"
moc = "1.3.0"
